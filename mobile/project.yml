name: HealthChecker
options:
  bundleIdPrefix: de.certhub
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  # mlx-swift-lm is HF-client-agnostic, so the app supplies the Hugging Face
  # client (swift-huggingface) and tokenizers (swift-transformers) itself and
  # bridges them via the MLXHuggingFace macros. Versions match the tested
  # combination in ml-explore/mlx-swift-examples.
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    exactVersion: "3.31.3"
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    exactVersion: "1.3.0"
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface.git
    exactVersion: "0.9.0"

targets:
  HealthChecker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    info:
      path: Support/Info.plist
      properties:
        CFBundleDisplayName: Liver Flap Check
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLName: de.certhub.liverflapcheck
            CFBundleURLSchemes:
              - liverflapcheck
        NSCameraUsageDescription: "Records a short clip of your hands for the on-device hand-movement check. The video stays on your device."
        NSMicrophoneUsageDescription: "Audio may be captured while recording the clip; it is processed only on your device and is never uploaded."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.certhub.liverflapcheck
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        CODE_SIGN_ENTITLEMENTS: Support/HealthChecker.entitlements
        # Set DEVELOPMENT_TEAM (or sign in Xcode) before deploying to a device.
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: mlx-swift-lm
        product: MLXVLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-transformers
        product: Tokenizers
      - package: swift-huggingface
        product: HuggingFace
